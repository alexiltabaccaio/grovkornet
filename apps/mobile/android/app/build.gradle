apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def projectRoot = rootDir.getAbsoluteFile().getParentFile().getAbsolutePath()

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    entryFile = file("../../index.ts")
    reactNativeDir = new File(["node", "--print", "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()
    hermesCommand = new File(["node", "--print", "require.resolve('hermes-compiler/package.json')"].execute(null, rootDir).text.trim()).getParentFile().getAbsolutePath() + "/hermesc/%OS-BIN%/hermesc"
    codegenDir = new File(["node", "--print", "require.resolve('@react-native/codegen/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim()).getParentFile().getAbsoluteFile()

    // Use Expo CLI to bundle the app, this ensures the Metro config
    // works correctly with Expo projects.
    cliFile = new File(["node", "--print", "require.resolve('@expo/cli', { paths: [require.resolve('expo/package.json')] })"].execute(null, rootDir).text.trim())
    bundleCommand = "export:embed"

    /* Folders */
     //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we'll skip bundling resources and assets.
    //   To add a custom flavor to the list of debuggable variants, uncomment the line below and replace `customFlavorDebug` with the appropriate variant name.
    debuggableVariants = ["developmentDebug", "productionDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = (findProperty('android.enableProguardInReleaseBuilds') ?: false).toBoolean()

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'org.webkit:android-jsc:+'

def localProperties = new Properties()
def localPropertiesFile = new File(rootDir, "local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withInputStream { instr ->
        localProperties.load(instr)
    }
}

// Resolve version details strictly from app.json
def appJsonFile = file("${rootDir}/../app.json")
if (!appJsonFile.exists()) {
    throw new RuntimeException("Required configuration file app.json is missing at: ${appJsonFile.absolutePath}")
}

def appVersionName
def appVersionCode
try {
    def slurper = Class.forName("groovy.json.JsonSlurper").getDeclaredConstructor().newInstance()
    def appJson = slurper.parse(appJsonFile)
    appVersionName = appJson.expo.version
    def androidMap = appJson.expo.android
    appVersionCode = (androidMap != null && androidMap.containsKey('versionCode') ? androidMap.get('versionCode') : 1) as Integer
} catch (Exception e) {
    throw new RuntimeException("Failed to parse app.json version configuration: " + e.message, e)
}

android {
    ndkVersion = rootProject.ext.ndkVersion

    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace = 'com.grovkornet.app.dev'
    defaultConfig {
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode appVersionCode
        versionName appVersionName
        testInstrumentationRunner "com.grovkornet.app.CustomTestRunner"
    }
    flavorDimensions "default"
    productFlavors {
        development {
            dimension "default"
            applicationId 'com.grovkornet.app.dev'
        }
        production {
            dimension "default"
            applicationId 'com.grovkornet.app'
        }
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            def storeFilePath = localProperties.getProperty('grovkornet.release.storeFile')
            if (storeFilePath != null && file(storeFilePath).exists()) {
                storeFile file(storeFilePath)
                storePassword localProperties.getProperty('grovkornet.release.storePassword')
                keyAlias localProperties.getProperty('grovkornet.release.keyAlias')
                keyPassword localProperties.getProperty('grovkornet.release.keyPassword')
            } else {
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }
    buildTypes {
        debug {
            signingConfig = signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig = signingConfigs.release
            shrinkResources = (findProperty('android.enableShrinkResourcesInReleaseBuilds')?.toBoolean() ?: false)
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            crunchPngs = (findProperty('android.enablePngCrunchInReleaseBuilds')?.toBoolean() ?: true)
        }
    }

    packaging {
        jniLibs {
            useLegacyPackaging = (findProperty('expo.useLegacyPackaging')?.toBoolean() ?: false)
            pickFirst "**/libc++_shared.so"
        }
        resources {
            excludes += "/META-INF/{AL2.0,LGPL2.1}"
            excludes += "META-INF/LICENSE*"
            excludes += "META-INF/NOTICE*"
            excludes += "META-INF/DEPENDENCIES"
            excludes += "META-INF/INDEX.LIST"
        }
    }
    androidResources {
        ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:!CVS:!thumbs.db:!picasa.ini:!*~'
    }

    externalNativeBuild {
        cmake {
            buildStagingDirectory "C:/tmp/gk_cxx"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    def isGifEnabled = (findProperty('expo.gif.enabled') ?: "") == "true";
    def isWebpEnabled = (findProperty('expo.webp.enabled') ?: "") == "true";
    def isWebpAnimatedEnabled = (findProperty('expo.webp.animated') ?: "") == "true";

    if (isGifEnabled) {
        // For animated gif support
        implementation("com.facebook.fresco:animated-gif:${reactAndroidLibs.versions.fresco.get()}")
    }

    if (isWebpEnabled) {
        // For webp support
        implementation("com.facebook.fresco:webpsupport:${reactAndroidLibs.versions.fresco.get()}")
        if (isWebpAnimatedEnabled) {
            // Animated webp support
            implementation("com.facebook.fresco:animated-webp:${reactAndroidLibs.versions.fresco.get()}")
        }
    }

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Testing dependencies
    testImplementation 'junit:junit:4.13.2'
    testImplementation "io.mockk:mockk:1.13.5"
    
    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
    androidTestImplementation "io.mockk:mockk-android:1.13.5"
}

task patchGraphicsConversions {
    doFirst {
        println "Executing patchGraphicsConversions task..."
        def cachesDir = new File(System.getProperty("user.home"), ".gradle/caches")
        if (cachesDir.exists()) {
            cachesDir.eachDir { gradleVersionDir ->
                def transformsDir = new File(gradleVersionDir, "transforms")
                if (transformsDir.exists()) {
                    transformsDir.eachDir { transformHashDir ->
                        def transformedDir = new File(transformHashDir, "transformed")
                        if (transformedDir.exists()) {
                            transformedDir.eachDir { candidateDir ->
                                if (candidateDir.name.startsWith("react-android")) {
                                    def file = new File(candidateDir, "prefab/modules/reactnative/include/react/renderer/core/graphicsConversions.h")
                                    if (file.exists()) {
                                        def content = file.text
                                        if (content.contains("return std::format(\"{}%\", dimension.value);")) {
                                            println "Patching: ${file.absolutePath}"
                                            content = content.replace(
                                                "return std::format(\"{}%\", dimension.value);",
                                                """char buffer[32];
      snprintf(buffer, sizeof(buffer), "%g%%", dimension.value);
      return std::string(buffer);"""
                                            )
                                            file.text = content
                                            println "Successfully patched: ${file.absolutePath}"
                                        }
                                    }
                                }
                            }
                        }
                    }
                }
            }
        }
    }
}

preBuild.dependsOn patchGraphicsConversions

tasks.configureEach { task ->
    if (task.name.contains("CMake") || task.name.contains("ExternalNativeBuild") || task.name.contains("generateJsonModel") || task.name.contains("prefab")) {
        task.dependsOn patchGraphicsConversions
    }
}
