// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '35.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '26')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '36')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '35')
        kotlinVersion = findProperty('android.kotlinVersion') ?: '2.1.0'

        ndkVersion = "27.1.12297006"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle:8.13.2')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    configurations.all {
        resolutionStrategy {
            force "com.facebook.react:react-native:0.85.3"
            force "com.facebook.react:react-android:0.85.3"
        }
    }
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url = new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../android')
        }
        maven {
            // Android JSC is installed from npm
            url = new File(['node', '--print', "require.resolve('jsc-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), '../dist')
        }

        google()
        mavenCentral()
        maven { url = 'https://www.jitpack.io' }
    }
}

// Ensure all library projects are evaluated before :app.
// This is crucial because under configure-on-demand Gradle might configure :app
// first and execute its native tasks (like clean or configureCMake) before
// library codegen tasks have a chance to register/run, which causes CMake to fail.
subprojects { subproj ->
    if (subproj.name == "app") {
        rootProject.subprojects { other ->
            if (other.name != "app") {
                subproj.evaluationDependsOn(other.path)
            }
        }
    }
}

// Disable native clean tasks (they are redundant and prone to failing due to missing autolinked JNI dirs).
// Instead, we will clean the CMake staging directory manually during app:clean.
subprojects { subproj ->
    subproj.tasks.configureEach { task ->
        if (task.name.contains("externalNativeBuildClean")) {
            task.enabled = false
        }
    }
}

// In the app project, delete the CMake build staging directory when cleaning.
// Also set up compilation dependencies so library codegen runs before app native tasks.
println "ROOT: Registering dependency hooks..."
project(":app") {
    tasks.configureEach { appTask ->
        if (appTask.name == "clean") {
            appTask.doFirst {
                def stagingDir = file("C:/tmp/gk_cxx")
                if (stagingDir.exists()) {
                    println "ROOT: Wiping CMake staging directory: ${stagingDir}"
                    stagingDir.deleteDir()
                }
            }
        } else if (appTask.name == "preBuild" ||
                   appTask.name.contains("CMake") || 
                   appTask.name.contains("NativeBuild") || 
                   appTask.name.contains("JsonModel")) {
            
            rootProject.subprojects { subproj ->
                if (subproj.name != "app") {
                    appTask.dependsOn {
                        subproj.tasks.matching { it.name == "generateCodegenArtifactsFromSchema" }
                    }
                }
            }
        }
    }
}
