appId: com.grovkornet.app
---
# Clean app initialization
- launchApp:
    clearState: true
    permissions:
      camera: grant
      microphone: grant

# Handle 16kB memory page compatibility popup (Android 15+)
- tapOn:
    text: "[Oo][Kk]"
    optional: true

# Handle runtime permissions popup if present
- tapOn:
    text: "(Mentre usi l'app|While using the app|Consenti|Allow).*"
    optional: true

# Wait for initial interface loading
- extendedWaitUntil:
    visible: "SISTEMA"
    timeout: 30000

# Navigation to the BODY section
- tapOn: "CORPO"

# 1. Exposure Module
- tapOn: "Esposizione"
- assertVisible: "ISO"
- swipe:
    direction: UP
    from:
      text: "ISO"
- tapOn: "ISO"

# 2. Lighting Module
- tapOn: "Illuminazione"
- assertVisible: "TORCIA"
- swipe:
    direction: UP
    from:
      text: "TORCIA"
- tapOn: "TORCIA"

# 3. Capture Module
- tapOn: "Acquisizione"
- assertVisible: "FORMATO"
- swipe:
    direction: UP
    from:
      text: "FORMATO"
- tapOn: "FORMATO"
