appId: com.grovkornet.app
---
# Inizializzazione pulita dell'app
- launchApp:
    clearState: true
    permissions:
      camera: grant
      microphone: grant

# Gestione popup compatibilit 16kB memory page (Android 15+)
- tapOn:
    text: "[Oo][Kk]"
    optional: true

# Gestione eventuale popup permessi a runtime
- tapOn:
    text: "(Mentre usi l'app|While using the app|Consenti|Allow).*"
    optional: true

# Attesa del caricamento iniziale dell'interfaccia
- extendedWaitUntil:
    visible: "SISTEMA"
    timeout: 30000

# Navigazione nella sezione CORPO
- tapOn: "CORPO"

# 1. Modulo Esposizione
- tapOn: "Esposizione"
- assertVisible: "ISO"
- swipe:
    direction: UP
    from:
      text: "ISO"
- tapOn: "ISO"

# 2. Modulo Illuminazione
- tapOn: "Illuminazione"
- assertVisible: "TORCIA"
- swipe:
    direction: UP
    from:
      text: "TORCIA"
- tapOn: "TORCIA"

# 3. Modulo Acquisizione
- tapOn: "Acquisizione"
- assertVisible: "FORMATO"
- swipe:
    direction: UP
    from:
      text: "FORMATO"
- tapOn: "FORMATO"
