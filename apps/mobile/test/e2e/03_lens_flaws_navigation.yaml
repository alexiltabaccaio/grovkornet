appId: com.grovkornet.app
---
# Clean app initialization
- launchApp:
    clearState: true
    permissions:
      camera: grant
      microphone: grant

# Handle 16kB memory page compatibility popup (Android 15+)
- tapOn:
    text: "[Oo][Kk]"
    optional: true

# Handle runtime permissions popup if present
- tapOn:
    text: "(Mentre usi l'app|While using the app|Consenti|Allow).*"
    optional: true

# Wait for initial interface loading
- extendedWaitUntil:
    visible: "SISTEMA"
    timeout: 30000

# 1. Open the LENS section
- tapOn: "OBIETTIVO"
- assertVisible: "Ottica"
- assertVisible: "Difetti Ottici"

# 3. Attempt to switch to the Lens Flaws module
- tapOn: "Difetti Ottici"

# 4. Verify that the module has indeed changed.
# If the tap is swallowed by the PanGesture, this assertion will fail
- assertVisible: "ABERRAZIONE CROMATICA"
