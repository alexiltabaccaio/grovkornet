appId: com.grovkornet.app
---
# Clean app initialization
- launchApp:
    clearState: true
    permissions:
      camera: grant
      microphone: grant

# Handle 16kB memory page compatibility popup (Android 15+)
- tapOn:
    text: "[Oo][Kk]"
    optional: true

# Handle runtime permissions popup if present
- tapOn:
    text: "(Mentre usi l'app|While using the app|Consenti|Allow).*"
    optional: true

# Wait for initial interface loading
- extendedWaitUntil:
    visible: "SISTEMA"
    timeout: 30000

# 1. Navigation to the BODY section
- tapOn: "CORPO"
- assertVisible: "Esposizione"
- assertVisible: "Illuminazione"

# 2. Selection of "Lighting" module (which activates the Torch)
- tapOn: "Illuminazione"
- assertVisible: "TORCIA"

# 3. Drag up the bottom sheet starting from the TORCH label
# to reveal the switch and intensity extension
- swipe:
    direction: UP
    from:
      text: "TORCIA"

# 4. Verify that the initial value is "OFF"
- assertVisible: "OFF"

# 5. Perform multiple toggling cycles to verify responsiveness
# Cycle 1
- tapOn: "OFF"
- assertVisible: "ON"
- tapOn: "ON"
- assertVisible: "OFF"

# Cycle 2
- tapOn: "OFF"
- assertVisible: "ON"
- tapOn: "ON"
- assertVisible: "OFF"

# Cycle 3
- tapOn: "OFF"
- assertVisible: "ON"
- tapOn: "ON"
- assertVisible: "OFF"
