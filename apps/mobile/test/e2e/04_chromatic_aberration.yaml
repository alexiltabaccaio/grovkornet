appId: com.grovkornet.app
---
# Clean app initialization
- launchApp:
    clearState: true
    permissions:
      camera: grant
      microphone: grant

# Handle 16kB memory page compatibility popup (Android 15+)
- tapOn:
    text: "[Oo][Kk]"
    optional: true

# Handle runtime permissions popup if present
- tapOn:
    text: "(Mentre usi l'app|While using the app|Consenti|Allow).*"
    optional: true

# Wait for initial interface loading
- extendedWaitUntil:
    visible: "SISTEMA"
    timeout: 30000

# 1. Navigation to the LENS section
- tapOn: "OBIETTIVO"
- assertVisible: "Ottica"
- assertVisible: "Difetti Ottici"

# 2. Selection of "Lens Flaws" module (which activates Chromatic Aberration)
- tapOn: "Difetti Ottici"
- assertVisible: "ABERRAZIONE CROMATICA"

# 3. Drag up the bottom sheet starting from the Chromatic Aberration label
# to reveal the slider and parameter extensions (STD, HOR, RAD)
- swipe:
    direction: UP
    from:
      text: "ABERRAZIONE CROMATICA"

# 4. Verify that the slider (initial value "0") is present
- assertVisible: "0"

# 5. Drag the slider to the right to increase the intensity
- swipe:
    start: 40%, 65%
    end: 80%, 65%

# 6. Verify that the value has changed (the initial "0" should no longer be visible)
- assertNotVisible: "0"

# 7. Double-tap the numeric value area on the right to reset it
- doubleTapOn:
    point: 88%, 65%

# 8. Verify that the value is successfully reset to "0"
- assertVisible: "0"

# 9. Verify that the direction extension buttons (STD, HOR, RAD) are visible
- assertVisible: "STD"
- assertVisible: "HOR"
- assertVisible: "RAD"

# 10. Sequential navigation between options to test button functionality
- tapOn: "HOR"
- tapOn: "RAD"
- tapOn: "STD"
