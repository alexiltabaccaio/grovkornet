appId: com.grovkornet.app
---
# Inizializzazione pulita dell'app
- launchApp:
    clearState: true
    permissions:
      camera: grant
      microphone: grant

# Gestione popup compatibilità 16kB memory page (Android 15+)
- tapOn:
    text: "[Oo][Kk]"
    optional: true

# Gestione eventuale popup permessi a runtime
- tapOn:
    text: "(Mentre usi l'app|While using the app|Consenti|Allow).*"
    optional: true

# Attesa del caricamento iniziale dell'interfaccia
- extendedWaitUntil:
    visible: "SISTEMA"
    timeout: 30000

# 1. Apre la sezione OBIETTIVO
- tapOn: "OBIETTIVO"
- assertVisible: "Ottica"
- assertVisible: "Difetti Ottici"

# 3. Tenta di passare al modulo Difetti Ottici
- tapOn: "Difetti Ottici"

# 4. Verifica se il modulo è effettivamente cambiato. 
# Se il tap viene inghiottito dal PanGesture, questo assert fallirà
- assertVisible: "Aberrazione"
