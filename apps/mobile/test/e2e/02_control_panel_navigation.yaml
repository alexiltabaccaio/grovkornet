appId: com.grovkornet.app
---
# Clean app initialization
- launchApp:
    clearState: true
    permissions:
      camera: grant
      microphone: grant

# Handle 16kB memory page compatibility popup (Android 15+)
- tapOn:
    text: "[Oo][Kk]"
    optional: true

# Handle runtime permissions popup if present
- tapOn:
    text: "(Mentre usi l'app|While using the app|Consenti|Allow).*"
    optional: true

# Wait for initial interface loading
- extendedWaitUntil:
    visible: "SISTEMA"
    timeout: 30000

# 1. Navigation to the SYSTEM section
- tapOn: "SISTEMA"
- assertVisible: "SISTEMA"
- assertVisible: "Preferenze"
- assertNotVisible: "Ottica"
- assertNotVisible: "Esposizione"

# 2. Navigation to the LENS section
- tapOn: "OBIETTIVO"
- assertVisible: "OBIETTIVO"
- assertVisible: "Ottica"
- assertVisible: "Difetti Ottici"
- assertNotVisible: "Preferenze"
- assertNotVisible: "Esposizione"

# 3. Navigation to the BODY section
- tapOn: "CORPO"
- assertVisible: "CORPO"
- assertVisible: "Esposizione"
- assertVisible: "Illuminazione"
- assertVisible: "Acquisizione"
- assertNotVisible: "Ottica"
- assertNotVisible: "Sviluppo"

# 4. Navigation to the FILM section
- tapOn: "PELLICOLA"
- assertVisible: "PELLICOLA"
- assertVisible: "Sviluppo"
- assertVisible: "Texture"
- assertNotVisible: "Esposizione"
- assertNotVisible: "Preferenze"

# 5. Closing the panel by tapping the active section again (FILM)
- tapOn: "PELLICOLA"
- assertNotVisible: "Sviluppo"
- assertNotVisible: "Texture"
