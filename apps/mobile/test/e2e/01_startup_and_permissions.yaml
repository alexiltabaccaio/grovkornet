appId: com.grovkornet.app
---
- launchApp:
    clearState: true
    # Automatically grants system permissions (Camera and Microphone) on startup.
    # This is the recommended approach in Maestro to avoid brittleness related to
    # language differences (e.g. "Consenti" vs "Allow") and OS versions on Android/iOS.
    permissions:
      camera: grant
      microphone: grant

# Verify that the app has passed the permission check phase (CameraScreen.tsx)
# and has successfully rendered the camera controls (FooterSections.tsx).
# 1. On Android 15+ emulators supporting 16 kB memory pages, starting a React Native app
# with native C++ libraries (Reanimated, Skia, etc.) triggers a system popup:
# "App compatibility for Android - This app is not compatible with 16 kB page sizes".
# We dismiss the popup by tapping "Ok" (or "OK").
- tapOn:
    text: "[Oo][Kk]"
    optional: true

# 2. On some Android/iOS versions or with Expo development clients, system permissions
# requested at runtime (PermissionsAndroid.request) still display the system popup.
# We intercept and accept the popup, optionally supporting both Italian and English.
- tapOn:
    text: "(Mentre usi l'app|While using the app|Consenti|Allow).*"
    optional: true

# We add an extended wait (up to 30 seconds) on the first assertion to allow time
# for the Metro bundler to load the Javascript bundle when testing in development mode.
- extendedWaitUntil:
    visible: "SISTEMA"
    timeout: 30000
- assertVisible: "OBIETTIVO"
- assertVisible: "CORPO"
- assertVisible: "PELLICOLA"
