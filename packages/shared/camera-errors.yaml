# yaml-language-server: $schema=./camera-errors.schema.json
errors:
  - name: E_CAMERA_UNAUTHORIZED
    code: 1001
    severity: fatal
    category: permissions
    required_params: []
    description: The user has not granted camera permissions.
  - name: E_SHADER_COMPILE_FAILED
    code: 1002
    severity: fatal
    category: rendering
    required_params:
      - shaderName
      - compileLog
    description: Failed to compile rendering shader.
  - name: E_PRESET_PREVIEW_FAILED
    code: 1003
    severity: warning
    category: preset
    required_params:
      - reason
    description: Failed to generate preset preview.
  - name: E_FILE_DELETE_FAILED
    code: 1004
    severity: warning
    category: io
    required_params:
      - uri
      - reason
    description: Failed to delete file.
  - name: E_ENGINE_LIBRARY_LOAD_FAILED
    code: 1005
    severity: fatal
    category: system
    required_params:
      - reason
    description: Failed to load native library grovkornet-engine.
  - name: E_CAMERA_BIND_FAILED
    code: 1006
    severity: fatal
    category: system
    required_params:
      - reason
    description: Failed to bind camera capture and preview use cases.
  - name: E_GALLERY_WRITE_FAILED
    code: 1007
    severity: warning
    category: io
    required_params:
      - reason
    description: Failed to save image to system gallery.
  - name: E_WATERMARK_EMBED_FAILED
    code: 1008
    severity: warning
    category: authenticity
    required_params:
      - reason
    description: Failed to embed native watermark signature on the image.
  - name: E_AUTHENTICITY_VERIFICATION_FAILED
    code: 1009
    severity: warning
    category: authenticity
    required_params:
      - reason
    description: Photo authenticity verification failed.
  - name: E_TORCH_SET_FAILED
    code: 1010
    severity: warning
    category: hardware
    required_params:
      - reason
    description: Failed to set flash/torch mode.
  - name: E_FILAMENT_INIT_FAILED
    code: 1011
    severity: fatal
    category: rendering
    required_params:
      - reason
    description: Filament native initialization failed (null pointer).
  - name: E_PIPELINE_INIT_FAILED
    code: 1012
    severity: fatal
    category: rendering
    required_params:
      - reason
    description: Failed to create rendering pipeline (textures/render targets).
  - name: E_LOW_MEMORY
    code: 1013
    severity: warning
    category: system
    required_params:
      - availableMemory
      - requiredMemory
    description: Device is running extremely low on memory, aborting intensive rendering operations.
  - name: E_THERMAL_THROTTLING
    code: 1014
    severity: warning
    category: system
    required_params:
      - thermalStatus
    description: Device temperature is too high, performance may be throttled.
  - name: E_ZOOM_OUT_OF_BOUNDS
    code: 1015
    severity: warning
    category: hardware
    required_params:
      - requestedZoom
      - maxZoom
    description: Requested zoom level is not supported by the camera hardware.
  - name: E_RESOLUTION_NOT_SUPPORTED
    code: 1016
    severity: warning
    category: hardware
    required_params:
      - width
      - height
    description: The requested camera resolution is not supported by this device.
