apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'
apply plugin: 'jacoco'

group = 'com.grovkornet.nativefilmcamera'
version = '1.0.0'

def expoModulesCorePlugin = new File(project(":expo-modules-core").projectDir, "ExpoModulesCorePlugin.gradle")
apply from: expoModulesCorePlugin.absolutePath

android {
  namespace "com.grovkornet.nativefilmcamera"
  compileSdkVersion 35

  defaultConfig {
    minSdkVersion 26
    targetSdkVersion 34
    testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

    externalNativeBuild {
      cmake {
        cppFlags "-std=c++17"
        arguments "-DANDROID_STL=c++_shared"
      }
    }
    ndk {
      abiFilters "arm64-v8a", "x86_64"
    }

    consumerProguardFiles "proguard-rules.pro"
  }

  externalNativeBuild {
    cmake {
      path "CMakeLists.txt"
    }
  }

  packagingOptions {
    pickFirst 'lib/*/libc++_shared.so'
  }

  lintOptions {
    abortOnError false
  }

  testOptions {
    unitTests.returnDefaultValues = true
  }
}

// Custom task to download and extract Filament Android Native headers/libs
task downloadFilament {
  def version = "1.71.4"
  // Note the '-native' suffix in the file name
  def url = "https://github.com/google/filament/releases/download/v${version}/filament-v${version}-android-native.tgz"
  def destDir = file("${projectDir}/filament")
  def destFile = file("${projectDir}/filament.tgz")

  inputs.property("version", version)
  outputs.dir(destDir)

  doLast {
    // Gradle automatically creates destDir because it is registered as an output directory.
    // Therefore, we check for a key header file rather than the directory itself.
    def checkHeader = file("${destDir}/include/filament/Engine.h")
    if (!checkHeader.exists()) {
      println "Downloading Filament v${version} from ${url}..."
      try {
        destFile.parentFile.mkdirs()
        new URL(url).withInputStream { i ->
          destFile.withOutputStream { it << i }
        }
        println "Extracting Filament tarball..."
        copy {
          from tarTree(resources.gzip(destFile))
          into projectDir
        }
        destFile.delete()
        println "Filament downloaded and extracted to ${destDir}."
      } catch (Exception e) {
        println "Failed to download/extract Filament: ${e.message}"
        if (destFile.exists()) destFile.delete()
        // If download failed, clean up the directory so we try again next time
        if (destDir.exists()) destDir.deleteDir()
        throw e
      }
    } else {
      println "Filament headers already exist, skipping download."
    }
  }
}

// Custom task to download and extract Filament host tools (matc)
task downloadMatc {
  def version = "1.71.4"
  def osName = org.gradle.internal.os.OperatingSystem.current()
  def osSuffix = "linux"
  if (osName.isWindows()) {
    osSuffix = "windows"
  } else if (osName.isMacOsX()) {
    osSuffix = "mac"
  }
  
  def url = "https://github.com/google/filament/releases/download/v${version}/filament-v${version}-${osSuffix}.tgz"
  def destDir = file("${projectDir}/filament-host")
  def destFile = file("${projectDir}/filament-host.tgz")
  def matcBin = file("${destDir}/bin/matc" + (osName.isWindows() ? ".exe" : ""))

  inputs.property("version", version)
  outputs.dir(destDir)

  doLast {
    if (!matcBin.exists()) {
      println "Downloading Filament Host Tools v${version} for ${osSuffix} from ${url}..."
      try {
        destFile.parentFile.mkdirs()
        new URL(url).withInputStream { i ->
          destFile.withOutputStream { it << i }
        }
        println "Extracting Filament Host Tools..."
        copy {
          from tarTree(resources.gzip(destFile))
          into destDir
        }
        destFile.delete()
        if (!osName.isWindows()) {
          exec { commandLine 'chmod', '+x', matcBin.absolutePath }
        }
        println "Filament Host Tools extracted to ${destDir}."
      } catch (Exception e) {
        println "Failed to download/extract Filament Host Tools: ${e.message}"
        if (destFile.exists()) destFile.delete()
        if (destDir.exists()) destDir.deleteDir()
        throw e
      }
    } else {
      println "Filament Host Tools already exist, skipping download."
    }
  }
}

// Compile shaders using matc
task compileShaders {
  dependsOn downloadMatc
  def matcBin = file("${projectDir}/filament-host/bin/matc" + (org.gradle.internal.os.OperatingSystem.current().isWindows() ? ".exe" : ""))
  def shadersDir = file("${projectDir}/src/main/filament-shaders")
  def assetsDir = file("${projectDir}/src/main/assets/materials")
  
  inputs.dir(shadersDir)
  outputs.dir(assetsDir)
  
  doLast {
    if (!assetsDir.exists()) {
      assetsDir.mkdirs()
    }
    
    fileTree(dir: shadersDir, include: '**/*.mat').each { File file ->
      def baseName = file.name.substring(0, file.name.lastIndexOf('.'))
      def outputFile = new File(assetsDir, "${baseName}.filamat")
      println "Compiling ${file.name} -> ${outputFile.name}..."
      
      exec {
        commandLine matcBin.absolutePath, '-a', 'opengl', '-p', 'mobile', '-o', outputFile.absolutePath, file.absolutePath
      }
    }
  }
}

// Hook CMake build to run after downloadFilament and compileShaders by binding it to preBuild
afterEvaluate {
  tasks.named('preBuild').configure {
    dependsOn downloadFilament
    dependsOn compileShaders
  }
}

dependencies {
  implementation project(':expo-modules-core')
  implementation "com.facebook.react:react-android"
  implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlinVersion"



  // CameraX dependencies
  def camerax_version = "1.5.0"
  implementation "androidx.camera:camera-core:${camerax_version}"
  implementation "androidx.camera:camera-camera2:${camerax_version}"
  implementation "androidx.camera:camera-lifecycle:${camerax_version}"
  implementation "androidx.camera:camera-view:${camerax_version}"
  implementation "androidx.lifecycle:lifecycle-process:2.6.2"

  testImplementation 'junit:junit:4.13.2'
  
  // Instrumented tests dependencies
  androidTestImplementation 'androidx.test:runner:1.5.2'
  androidTestImplementation 'androidx.test:rules:1.5.0'
  androidTestImplementation 'androidx.test.ext:junit:1.1.5'
}

jacoco {
  toolVersion = "0.8.12"
}

tasks.withType(Test).configureEach {
  jacoco.includeNoLocationClasses = true
  jacoco.excludes = ['jdk.internal.*']
}

task jacocoTestReport(type: JacocoReport, dependsOn: ['testDebugUnitTest']) {
  reports {
    xml.required = true
    html.required = true
  }

  def fileFilter = ['**/R.class', '**/R$*.class', '**/BuildConfig.*', '**/Manifest*.*', '**/*Test*.*', 'android/**/*.*']
  def debugTree = fileTree(dir: "${buildDir}/tmp/kotlin-classes/debug", excludes: fileFilter)
  def mainSrc = "${projectDir}/src/main/java"

  sourceDirectories.setFrom(files([mainSrc]))
  classDirectories.setFrom(files([debugTree]))
  executionData.setFrom(fileTree(dir: "$buildDir", include: [
    "jacoco/testDebugUnitTest.exec"
  ]))
}
